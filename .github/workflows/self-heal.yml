name: Self Heal

on:
  schedule:
    # ICT月曜 03:00 実行 (UTC 月曜 20:00)
    - cron: '0 20 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # L1: ESLint auto-fix / Prettier / patch依存更新 / DS修正 → auto-merge
  # ============================================================
  l1-autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: ESLint auto-fix (未使用import / デザインシステム違反含む)
        run: npx eslint . --fix --ext .ts,.tsx --ignore-pattern '.next' --ignore-pattern 'node_modules' || true

      - name: Prettier format
        run: npx prettier --write "**/*.{ts,tsx,js,json,css}" --ignore-path .gitignore 2>/dev/null || true

      - name: Patch dependency update
        run: npm update --save 2>/dev/null || true

      - name: Check for L1 changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create L1 PR and auto-merge
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="self-heal/l1/$(date +%Y%m%d)"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "MetaGo"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(self-heal): ESLint auto-fix / Prettier / patch updates [L1]"
          git push origin "$BRANCH"
          gh pr create \
            --title "🤖 [self-heal L1] ESLint fix / Prettier / patch更新" \
            --body "MetaGo Self-Heal による自動修正PRです。

**変更内容 (L1 — 自動マージ)**
- ESLint auto-fix（未使用import削除、デザインシステム違反修正を含む）
- Prettier 整形
- patch バージョン依存更新 (\`npm update\`)

> コードロジックへの変更はありません。安全な機械的修正のみです。" \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --squash 2>/dev/null || true

  # ============================================================
  # L2: minor/major依存更新 → PR作成 + MetaGo approval_queue 通知
  # ============================================================
  l2-dep-updates:
    runs-on: ubuntu-latest
    needs: l1-autofix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Detect minor/major updates (L2対象)
        id: detect
        run: |
          PKGS=$(npm outdated --json 2>/dev/null | node -e "
            let raw = '';
            process.stdin.on('data', d => raw += d);
            process.stdin.on('end', () => {
              try {
                const d = JSON.parse(raw || '{}');
                const pkgs = Object.entries(d)
                  .filter(([, v]) => {
                    if (!v.current || !v.latest) return false;
                    const cur = v.current.replace(/[^0-9.]/g, '').split('.').map(Number);
                    const lat = v.latest.replace(/[^0-9.]/g, '').split('.').map(Number);
                    // minor または major アップデートのみ (patch は L1 で処理済み)
                    return lat[0] > cur[0] || (lat[0] === cur[0] && lat[1] > cur[1]);
                  })
                  .map(([name, v]) => name + '@' + v.latest);
                process.stdout.write(pkgs.join(' '));
              } catch { process.stdout.write(''); }
            });
          " 2>/dev/null || true)
          if [ -n "$PKGS" ]; then
            echo "packages=$PKGS" >> $GITHUB_OUTPUT
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply updates
        if: steps.detect.outputs.has_updates == 'true'
        run: npm install ${{ steps.detect.outputs.packages }} --save 2>/dev/null || true

      - name: Create L2 PR
        id: l2-pr
        if: steps.detect.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "pr_url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          BRANCH="self-heal/l2/$(date +%Y%m%d)"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "MetaGo"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json 2>/dev/null || git add -A
          git commit -m "chore(deps): minor/major dependency updates [L2 — MetaGo承認待ち]"
          git push origin "$BRANCH"
          URL=$(gh pr create \
            --title "🤖 [self-heal L2] 依存更新 — MetaGo承認待ち" \
            --body "MetaGo Self-Heal が検出した依存パッケージ更新です。
MetaGoで承認されるとマージされます。

**更新パッケージ**
\`\`\`
${{ steps.detect.outputs.packages }}
\`\`\`

> ⚠️ L2: MetaGoの承認待ちです。自動マージされません。" \
            --base main \
            --head "$BRANCH")
          echo "pr_url=$URL" >> $GITHUB_OUTPUT

      - name: Notify MetaGo approval queue
        if: steps.detect.outputs.has_updates == 'true' && steps.l2-pr.outputs.pr_url != ''
        env:
          METAGO_URL: ${{ secrets.METAGO_URL }}
          METAGO_SERVICE_KEY: ${{ secrets.METAGO_SERVICE_KEY }}
        run: |
          curl -sf -X POST "${METAGO_URL}/api/approval" \
            -H "Authorization: Bearer ${METAGO_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"title\": \"依存更新: ${{ steps.detect.outputs.packages }}\",
              \"description\": \"minor/major バージョンの依存パッケージ更新が検出されました。PRを確認して承認してください。\",
              \"category\": \"dependency\",
              \"level\": \"L2\",
              \"pr_url\": \"${{ steps.l2-pr.outputs.pr_url }}\"
            }" || echo "⚠️  MetaGo notification failed (non-critical)"
